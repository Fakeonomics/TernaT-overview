<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Consolas,monospace">
  <rect width="800" height="500" fill="#1e1e1e" rx="8"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" fill="#aaa" font-size="14">Learned Neural VSA Reasoner</text>

  <!-- Pipeline boxes -->
  <g>
    <rect x="30" y="60" width="200" height="50" rx="6" fill="#2d2d2d" stroke="#569cd6" stroke-width="1.5"/>
    <text x="130" y="83" text-anchor="middle" fill="#569cd6" font-size="13" font-weight="bold">NL Parser v2</text>
    <text x="130" y="100" text-anchor="middle" fill="#888" font-size="10">50+ patterns, neural</text>
  </g>
  <g>
    <rect x="30" y="130" width="200" height="50" rx="6" fill="#2d2d2d" stroke="#4ec9b0" stroke-width="1.5"/>
    <text x="130" y="153" text-anchor="middle" fill="#4ec9b0" font-size="13" font-weight="bold">PredicateShardedStore</text>
    <text x="130" y="170" text-anchor="middle" fill="#888" font-size="10">VSA memory D=1024</text>
  </g>
  <g>
    <rect x="30" y="200" width="200" height="50" rx="6" fill="#2d2d2d" stroke="#dcdcaa" stroke-width="1.5"/>
    <text x="130" y="223" text-anchor="middle" fill="#dcdcaa" font-size="13" font-weight="bold">TernMLResonator</text>
    <text x="130" y="240" text-anchor="middle" fill="#888" font-size="10">16 KB, 65K ternary</text>
  </g>
  <g>
    <rect x="30" y="270" width="200" height="50" rx="6" fill="#2d2d2d" stroke="#c586c0" stroke-width="1.5"/>
    <text x="130" y="293" text-anchor="middle" fill="#c586c0" font-size="13" font-weight="bold">FastController</text>
    <text x="130" y="310" text-anchor="middle" fill="#888" font-size="10">610 KB, BC-trained</text>
  </g>
  <g>
    <rect x="30" y="340" width="200" height="50" rx="6" fill="#2d2d2d" stroke="#ce9178" stroke-width="1.5"/>
    <text x="130" y="363" text-anchor="middle" fill="#ce9178" font-size="13" font-weight="bold">ChainScorer</text>
    <text x="130" y="380" text-anchor="middle" fill="#888" font-size="10">461 KB, Transformer 2L/4H</text>
  </g>

  <!-- Arrows -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#569cd6"/>
    </marker>
  </defs>
  <line x1="230" y1="85" x2="370" y2="250" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="230" y1="155" x2="370" y2="255" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="230" y1="225" x2="370" y2="260" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="230" y1="295" x2="370" y2="265" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="230" y1="365" x2="370" y2="270" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Beam search -->
  <rect x="340" y="230" width="130" height="55" rx="20" fill="#333" stroke="#e6db74" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="405" y="254" text-anchor="middle" fill="#e6db74" font-size="11">Beam Search</text>
  <text x="405" y="272" text-anchor="middle" fill="#888" font-size="10">width 1-3</text>

  <!-- MCU box -->
  <rect x="530" y="210" width="240" height="100" rx="8" fill="#1a3a1a" stroke="#4ec9b0" stroke-width="2"/>
  <text x="650" y="240" text-anchor="middle" fill="#4ec9b0" font-size="16" font-weight="bold">Answer (entity)</text>
  <text x="650" y="260" text-anchor="middle" fill="#aaa" font-size="11">~1.1 MB full pipeline</text>
  <text x="650" y="278" text-anchor="middle" fill="#888" font-size="11">90% exact multi-hop QA</text>
  <text x="650" y="296" text-anchor="middle" fill="#888" font-size="11">No LLM, no GPU</text>

  <!-- Stats -->
  <rect x="530" y="340" width="240" height="50" rx="6" fill="#2d2d2d" stroke="#888" stroke-width="1"/>
  <text x="650" y="362" text-anchor="middle" fill="#888" font-size="11">100% 1-hop / 100% 2-hop / 70% 3-hop</text>
  <text x="650" y="378" text-anchor="middle" fill="#666" font-size="10">96 facts, 30 queries, 53 entities</text>
  <line x1="650" y1="310" x2="650" y2="340" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Bottom text -->
  <text x="400" y="470" text-anchor="middle" fill="#555" font-size="12">TernaT — First Learned Neural VSA Reasoner</text>
  <text x="400" y="490" text-anchor="middle" fill="#444" font-size="10">fakeonomics.github.io/TernaT-overview</text>
</svg>
